register_source:
  name: Register Notification Source
  description: Register a notification source with the Notification Center.
  fields:
    source_id:
      description: "Stable source ID. If omitted, a slug will be generated from name."
      required: false
      example: "water_leak"
      selector:
        text:
    name:
      description: "Display name of the notification source."
      required: true
      example: "漏水警報"
      selector:
        text:
    icon:
      description: "MDI icon for the notification."
      required: false
      example: "mdi:water-alert"
      selector:
        icon:
    priority:
      description: "Priority level: info, warning, or critical."
      required: false
      default: "info"
      selector:
        select:
          options:
            - "info"
            - "warning"
            - "critical"
    description:
      description: "Description text for the notification message."
      required: false
      example: "廚房漏水偵測器觸發"
      selector:
        text:
    tap_action_entity:
      description: "Entity to navigate to when notification is tapped."
      required: false
      example: "binary_sensor.water_leak"
      selector:
        entity:

push_notification:
  name: Push Notification
  description: Push a notification directly into the Notification Center feed for card display and automation-driven alerts.
  fields:
    source_id:
      description: "Stable source ID for update/replace/clear operations."
      required: true
      example: "pump_alarm_main"
      selector:
        text:
    name:
      description: "Display name of the notification."
      required: true
      example: "主泵浦異常"
      selector:
        text:
    icon:
      description: "MDI icon for the notification."
      required: false
      example: "mdi:pump"
      selector:
        icon:
    priority:
      description: "Priority level: info, warning, or critical."
      required: false
      default: "info"
      selector:
        select:
          options:
            - "info"
            - "warning"
            - "critical"
    description:
      description: "Description text shown in the card."
      required: false
      example: "壓力低於安全值，請立即檢查"
      selector:
        text:
    tap_action:
      description: "Action when notification is tapped: more-info (default), navigate, or url."
      required: false
      default: "more-info"
      selector:
        select:
          options:
            - "more-info"
            - "navigate"
            - "url"
    tap_action_entity:
      description: "Entity to show in more-info panel when notification is tapped."
      required: false
      example: "switch.pump_main"
      selector:
        entity:
    tap_action_navigation_path:
      description: "Path to navigate to when tap_action is 'navigate'."
      required: false
      example: "/lovelace/0"
      selector:
        text:
    tap_action_url_path:
      description: "URL to open in new tab when tap_action is 'url'."
      required: false
      example: "https://example.com"
      selector:
        text:
    auto_clear_seconds:
      description: "Optional TTL in seconds. When reached, the notification is auto-cleared."
      required: false
      example: 3600
      selector:
        number:
          min: 1
          max: 604800
          unit_of_measurement: seconds

clear_notification:
  name: Clear Notification
  description: Remove a directly pushed notification from the Notification Center feed.
  fields:
    source_id:
      description: "Stable source ID of the notification to clear."
      required: true
      example: "pump_alarm_main"
      selector:
        text:

snooze:
  name: Snooze Notification
  description: Temporarily silence a notification source.
  fields:
    source_id:
      description: "ID of the notification source to snooze."
      required: true
      example: "water_leak"
      selector:
        text:
    duration_hours:
      description: "Duration in hours to snooze."
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 168
          unit_of_measurement: hours

unsnooze:
  name: Unsnooze Notification
  description: Remove snooze from a notification source.
  fields:
    source_id:
      description: "ID of the notification source."
      required: true
      selector:
        text:

acknowledge:
  name: Acknowledge Notification
  description: Mark a notification as acknowledged (stops critical repeat).
  fields:
    source_id:
      description: "ID of the notification source to acknowledge."
      required: true
      selector:
        text:

toggle_dropdown:
  name: Toggle Notification Dropdown
  description: Toggle the notification dropdown panel open/close state.
  fields: {}
